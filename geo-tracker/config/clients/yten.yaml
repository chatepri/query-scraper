# Client config for YTEN (You're The Expert Now)
# Edit this file to change prompts, competitors, or brand variants
# No code changes required to update tracking

client:
  id: yten
  name: "You're The Expert Now"
  brand_variants:
    # All strings the LLM judge will treat as a YTEN mention
    - "YTEN"
    - "Y-TEN"
    - "YTen"
    - "YEN"
    - "You're The Expert Now"
    - "Youre The Expert Now"
    - "Your The Expert Now"
  website: "yten.com"
  location: "Buffalo, NY"
  industry: "Generative AI consulting and training"

competitors:
  # Other firms operating in GenAI consulting / AI training / GEO space
  # The LLM judge tracks these alongside the client for share-of-voice
  - name: "Profound"
    variants: ["Profound", "Profound AI"]
  - name: "Otterly.AI"
    variants: ["Otterly", "Otterly.AI", "OtterlyAI"]
  - name: "Frase"
    variants: ["Frase", "Frase.io"]
  - name: "Peec.ai"
    variants: ["Peec", "Peec.ai"]

prompts:
  # Each prompt has an intent category for downstream analysis
  # Categories: commercial, informational, comparison, local
  # Start with ~15 prompts to validate; expand to 25-50 once results look right

  - id: p001
    category: commercial
    text: "What are the best Generative Engine Optimization (GEO) consultants in the US?"

  - id: p002
    category: commercial
    text: "Which companies help businesses optimize for AI search and answer engines?"

  - id: p003
    category: local
    text: "Who are the top generative AI consultants in Buffalo, NY?"

  - id: p004
    category: local
