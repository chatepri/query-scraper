# Client config — flat prompt list + optional sweeps.
# To onboard a new client: copy this file, change `client` and `variables`,
# write `prompts`, optionally add `sweeps`. No template engine, no tiers.

client:
  id: yten
  name: "You're The Expert Now"

# Variables fill {placeholder} tokens in prompts AND sweeps.
# `name` is always available automatically (from client.name above).
variables:
  location_specific: "Buffalo, NY"
  location_regional: "Western New York"
  location_metro: "Buffalo-Niagara"
  industry: "Generative AI consulting and training"
  industry_short: "AI training"
  specialty: "Generative Engine Optimization"
  audience_primary: "small businesses"
  audience_secondary: "nonprofits and law firms"

# PROMPTS: any query that returns a list of businesses.
# Bare service descriptions, questions, qualifier+location — all valid.
prompts:
  - "What is {name}?"
  - "Who offers {specialty} services?"
  - "{industry_short} for {audience_primary}"
  - "{industry} consultants in {location_regional}"
  - "Best {industry_short} services in {location_specific}"

# SWEEPS (optional): expand one pattern across many values (cross-product).
# Delete this whole block if you don't need it.
sweeps:
  - pattern: "{qualifier} {industry_short} services in {location}"
    qualifier: ["Best", "Top", "Leading"]
    location: ["Buffalo, NY", "Western New York"]
    # 3 x 2 = 6 generated prompts (one may dedup against the explicit "Best ... Buffalo, NY")